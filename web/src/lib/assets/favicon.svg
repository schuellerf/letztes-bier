<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <title>Letztes Bier — Sackkarre</title>
  <!-- Single wheel (left / rear) -->
  <circle cx="7.6" cy="25" r="3.35" fill="#3d444c"/>
  <circle cx="7.6" cy="25" r="1.3" fill="#6d7380"/>
  <!-- Frame: near-vertical post + tilted load arm -->
  <line
    x1="7.6" y1="25.2"
    x2="6.8"
    y2="5.8"
    stroke="#5c6570"
    stroke-width="3.1"
    stroke-linecap="round"
  />
  <line
    x1="7.5"
    y1="21.85"
    x2="29.2"
    y2="20.6"
    stroke="#5c6570"
    stroke-width="2.9"
    stroke-linecap="round"
  />
  <!-- Tall narrow glass (Willybecher / Stange-style side profile) -->
  <path
    fill="#e8c96b"
    stroke="#000"
    stroke-width="0.35"
    stroke-linejoin="round"
    d="M15.35 21.35 L14.95 19.85 L15.15 5.85 H21.25 L21.45 19.85 L21.05 21.35 Z"
  />
  <path fill="#c9a227" d="M15.35 8.6 L21.05 8.6 L21.1 10.2 H15.3 Z"/>
  <!-- Rim -->
  <path
    fill="none"
    stroke="#000"
    stroke-width="0.28"
    d="M15.05 6.35 H21.35"
  />
  <!-- Slim ear handle -->
  <path
    fill="none"
    stroke="#000"
    stroke-width="0.35"
    stroke-linecap="round"
    d="M21.65 7.2 C24.6 7.2 26.5 9.8 26.5 13.2 C26.5 16.6 24.7 20.5 21.7 21.1"
  />
  <!-- Foam (narrow stack above rim) -->
  <path
    fill="#f5f5f0"
    stroke="#000"
    stroke-width="0.3"
    stroke-linejoin="round"
    d="M14.2 7.2 C14.2 5.4 15.6 4 17.6 3.7 C18 2.6 18.9 1.9 20.1 1.9 C21.4 1.9 22.5 2.7 22.8 4 C24.2 4.3 25.2 5.8 24.9 7.4 C24.6 8.9 23 10 21.3 9.8 L15.5 8.8 C14.4 8.6 13.8 7.9 14.2 7.2 Z"
  />
  <circle cx="17.8" cy="4.2" r="0.9" fill="#fafaf8" stroke="#000" stroke-width="0.22"/>
  <circle cx="19.9" cy="4.6" r="0.65" fill="#fafaf8" stroke="#000" stroke-width="0.18"/>
  <circle cx="18.9" cy="5.8" r="0.38" fill="#e8e8e4" stroke="#000" stroke-width="0.16"/>
</svg>
